<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Туатара массаж</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-title">Туатара</div>
    </div>

    <button class="burger">☰</button>

    <div class="header-city-switch">
      <button id="changeCityBtn" class="city-switch-btn">
        📍 Выбор города: <span id="currentCityLabel">Москва</span>
      </button>
    </div>
  </div>
</header>

<div id="cityOverlay" class="city-overlay hidden">
  <button class="city-btn" data-city="moscow">Москва</button>
  <button class="city-btn" data-city="saratov">Саратов</button>
</div>

<script src="script.js"></script>
</body>
</html>
